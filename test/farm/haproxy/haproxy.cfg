
global
  daemon
  maxconn 10000

defaults
    mode http

listen stats
  bind *:9999
  stats enable
  stats uri /

frontend htmltopdf
  bind *:8080
  use_backend htmltopdfBackend

backend htmltopdfBackend
    balance roundrobin
    cookie SERVERID insert indirect nocache
    option httpchk GET /health
    http-check expect status 200
    server htmltopdf1 htmltopdf1:8080 maxconn 10000 check cookie htmltopdf1
    server htmltopdf2 htmltopdf2:8080 maxconn 10000 check cookie htmltopdf2
    server htmltopdf3 htmltopdf3:8080 maxconn 10000 check cookie htmltopdf3
